<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Páratartalom</title>
    <script src='https://cdn.plot.ly/plotly-3.3.0.min.js'></script>
</head>

<body>
    <header>
        <h1>Páratartalom</h1>
    </header>
    <div><h3>Legutóbbi adatok ({{ lastReadingTime }}):
        Hőmérséklet: {{ temperature }} °C,
        Páratartalom: {{ humidity }} %
    </h3></div>
    <div id='myDiv'></div>
    <div id='myDiv2'></div>
    <script>
        const loadedData = {{ data|tojson }}

        var trace1 = {
            x: loadedData.map(row => row[0]),
            y: loadedData.map(row => row[1]),
            mode: 'lines+markers',
            type: 'scatter',
            name: 'Páratartalom DHT11',
        };

        var trace2 = {
            x: loadedData.map(row => row[0]),
            y: loadedData.map(row => row[2]),
            mode: 'lines+markers',
            type: 'scatter',
            name: 'Hőmérséklet DHT11',
        };

        var trace3 = {
            x: loadedData.map(row => row[0]),
            y: loadedData.map(row => row[3]),
            mode: 'lines+markers',
            type: 'scatter',
            name: 'Páratartalom BM280',
        };

        var trace4 = {
            x: loadedData.map(row => row[0]),
            y: loadedData.map(row => row[4]),
            mode: 'lines+markers',
            type: 'scatter',
            name: 'Hőmérséklet BM280',
        };

        var trace5 = {
            x: loadedData.map(row => row[0]),
            y: loadedData.map(row => row[5]),
            mode: 'lines+markers',
            type: 'scatter',
            name: 'Nyomás BM280',
        };

        var plotData = [trace1, trace2, trace3, trace4];
        var plotData2 = [trace5];

        Plotly.newPlot('myDiv', plotData);
        Plotly.newPlot('myDiv2', plotData2);
    </script>
</body>
</html>
